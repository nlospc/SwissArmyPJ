task_id: workbench-layout-design-language-2026-04-28
title: Project Workspace layout and design language
status: evaluating

active_agent: codex
active_role: evaluator
active_writer: none

branch: swissarmypm
package_scope: packages/swissarmypm

intent:
  goal: "Redefine the SwissArmyPM Project Workspace layout and design language so the left sidebar is fully used for workspace navigation, the page no longer duplicates a second module menu, and the main work surface becomes clearer, wider, and less visually crowded."
  non_goals:
    - Redesigning every module's internal CRUD model in this slice.
    - Changing Timeline domain behavior already defined in the Timeline Work Items slice.
    - Expanding Portfolio, My Work, or Pomodoro as product centers.
    - Replacing Ant Design or the existing Electron/React architecture.
    - Adding a package-manager-level dependency from SwissArmyPM to PMBrain.
  invariants:
    - PM Workspace remains the product center.
    - The app-level left sidebar owns primary navigation.
    - Project Workspace modules must stay directly reachable.
    - The main module surface must receive priority over summaries and duplicate navigation.
    - The right inspector remains contextual and secondary.
    - Evidence remains a supporting source layer, not a competing product center.
    - AI may suggest UI organization but must not silently rewrite core project facts.
  constraints:
    - Follow document priority root CLAUDE.md, package CLAUDE.md, then shared workflow docs.
    - Scope is packages/swissarmypm unless explicitly changed.
    - PMBrain must not depend on SwissArmyPM.
    - SwissArmyPM must not add a package-manager-level dependency on PMBrain.
    - Do not expand Portfolio, My Work, or Pomodoro as the product center.
    - Use Ant Design theme tokens and existing theme conventions.
    - Preserve desktop-first workbench semantics.
    - Avoid nested page-layout cards and duplicate module rails.
  success_metrics:
    - Project Workspace no longer renders a second full module rail inside the page.
    - The left sidebar exposes Canvas, Stakeholders, Timeline, Risks, Work Packages, and Evidence in the workbench context.
    - Timeline and other dense modules gain horizontal space compared with the current three-column layout.
    - Navigation labels become concise and scannable without paragraph descriptions.
    - The project header remains useful but more compact.
    - The right inspector remains available without competing with the main work surface.
  unacceptable_shortcuts:
    - Keeping the existing page rail and merely changing colors or spacing.
    - Moving duplication from the page into another nested card.
    - Hiding important workspace modules behind unclear menus.
    - Making the workbench feel like a marketing dashboard instead of an operational PM tool.
    - Hardcoding one-off colors outside the theme system.
    - Expanding unrelated modules while solving layout hierarchy.

execution_package:
  spec: "Prepare the first executable layout/design-language slice for SwissArmyPM. The design package must make the app-level sidebar responsible for Project Workspace module navigation, remove the duplicate in-page module rail, define the main workspace/inspector hierarchy, and document the design language constraints before implementation starts."
  acceptance:
    - id: A1
      description: "Document the new Workbench layout and design-language rules under docs/PRD/cross-cutting."
    - id: A2
      description: "Define that the left sidebar owns Project Workspace module navigation and the page must not render a duplicate full module rail."
    - id: A3
      description: "Define a two-region Project Workspace page model: main work surface plus optional right inspector."
    - id: A4
      description: "Define visual-density and design-language rules for operational desktop PM screens."
    - id: A5
      description: "Identify the first implementation slice and follow-up cleanup slice."
    - id: A6
      description: "Implement the accepted first layout slice after human approval."
  task_contract:
    allowed_paths:
      - packages/swissarmypm/src/**
      - packages/swissarmypm/CLAUDE.md
      - docs/**
      - workflow/**
      - CLAUDE.md
      - AGENTS.md
      - package.json
      - package-lock.json
    forbidden_paths:
      - packages/pmbrain/**
    required_outputs:
      - "Workbench layout and design language PRD under docs/PRD/cross-cutting."
      - "Human approval before code changes begin."
      - "If implementation starts later, update Sidebar, ProjectWorkbenchPage, workbench store usage, and relevant layout styles consistently."
      - "Update workflow/handoff.md after each workflow transition."
      - "Run npm run verify workflow after workflow state changes."
      - "Run the verify command from workflow/project-profile.yaml before finishing implementation work."
  edge_cases:
    - "No project is selected but the user opens Project Workspace."
    - "A project is selected and the sidebar must show both app navigation and workspace modules."
    - "The window is narrow enough that the right inspector must become a drawer."
    - "Module counts are expensive or unavailable at sidebar render time."
    - "Long translated labels need to fit without widening the sidebar unpredictably."
    - "Timeline needs maximum horizontal space without hiding critical project context."
  verification_checklist:
    - "Run npm run verify workflow after active-task.yaml changes."
    - "Before implementation, review package-level SwissArmyPM CLAUDE.md and PRD-202."
    - "For implementation, run npm run verify swissarmypm from repo root before completion."
    - "If broader workspace contracts change, run npm run verify workspace."
    - "Verify no changes are made under packages/pmbrain."
    - "Verify the Project Workspace does not render a duplicate full module rail."
    - "Verify the left sidebar exposes workspace modules in workbench context."
  forbidden_changes:
    - "Do not implement Portfolio, My Work, or Pomodoro expansion as part of this task."
    - "Do not add a package-manager-level dependency from SwissArmyPM to PMBrain."
    - "Do not make PMBrain depend on SwissArmyPM."
    - "Do not replace Ant Design as part of this task."
    - "Do not change Timeline domain rules while solving layout hierarchy."
    - "Do not treat future layout drafts as implementation approval until human review is complete."

